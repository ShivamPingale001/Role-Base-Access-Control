<!DOCTYPE html>
<html>
<head>
<title>RBAC System</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #141e30, #243b55);
    color: white;
    text-align: center;
}
.container {
    margin-top: 100px;
}
button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    background: #00c6ff;
    color: black;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #0072ff;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>RBAC Authentication System</h1>
    <p>Role Based Access Control using Spring Boot & JWT</p>

    <button onclick="goLogin()">Login</button>
    <button onclick="goRegister()">Register</button>
</div>

<script>
function goLogin() {
    window.location.href = "login.html";
}
function goRegister() {
    window.location.href = "register.html";
}
</script>

</body>
</html>
